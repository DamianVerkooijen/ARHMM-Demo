<!DOCTYPE html>
<html>
<head>
    <title>AR Helicopter Sim</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
            z-index: 10; display: flex; justify-content: space-between; pointer-events: none;
        }
        .joystick-zone { width: 150px; height: 150px; pointer-events: auto; margin: 20px; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="ui-container">
        <div id="left-joystick" class="joystick-zone"></div>
        <div id="right-joystick" class="joystick-zone"></div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        
        <a-assets>
            <a-asset-item id="heli-model" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/ToyCar/glTF/ToyCar.gltf"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="heli-rig" position="0 0.5 0">
                <a-box id="heli-body" width="0.5" height="0.3" depth="1" color="#333">
                    <a-box position="0 0.2 0" width="0.8" height="0.02" depth="0.1" color="#888" 
                           animation="property: rotation; to: 0 360 0; loop: true; dur: 200; easing: linear">
                    </a-box>
                </a-box>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const heli = document.querySelector('#heli-rig');
        let moveInput = { x: 0, y: 0 };
        let rotateInput = 0;
        const speed = 0.05;

        // Left Joystick: Move forward/backward relative to heading
        nipplejs.create({
            zone: document.getElementById('left-joystick'),
            mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'blue'
        }).on('move', (evt, data) => {
            // We only care about the vertical push for forward/backward
            moveInput.y = data.vector.y; 
            moveInput.x = data.vector.x; // Optional: lateral strafing
        }).on('end', () => { moveInput = { x: 0, y: 0 }; });

        // Right Joystick: REVERSED Rotation
        nipplejs.create({
            zone: document.getElementById('right-joystick'),
            mode: 'static', position: { right: '75px', bottom: '75px' }, color: 'red'
        }).on('move', (evt, data) => {
            // Reversing the logic: - data.vector.x instead of +
            rotateInput = -data.vector.x * 3; 
        }).on('end', () => { rotateInput = 0; });

        function update() {
            if (heli) {
                // 1. Update Rotation First
                let rotation = heli.getAttribute('rotation');
                let newYaw = rotation.y + rotateInput;
                heli.setAttribute('rotation', { x: 0, y: newYaw, z: 0 });

                // 2. Calculate Directional Movement
                // Convert degrees to radians for JS Math functions
                let angleRad = (newYaw * Math.PI) / 180;
                
                let currPos = heli.getAttribute('position');

                // The Magic: Calculate X and Z based on where the heli is facing
                // Forward on joystick (moveInput.y) pushes us along the Sine/Cosine of our angle
                let dx = Math.sin(angleRad) * (moveInput.y * speed);
                let dz = Math.cos(angleRad) * (moveInput.y * speed);

                heli.setAttribute('position', {
                    x: currPos.x + dx,
                    y: currPos.y, 
                    z: currPos.z + dz
                });
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
