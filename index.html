<!DOCTYPE html>
<html>
<head>
    <title>AR Heli: Stable & Resettable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 220px;
            z-index: 10; display: flex; justify-content: space-between; pointer-events: none;
        }
        .joystick-zone { width: 160px; height: 160px; pointer-events: auto; margin: 30px; }
        
        /* Reset Button Styling */
        #reset-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(44, 62, 80, 0.8);
            color: white;
            border: 2px solid #f1c40f;
            border-radius: 10px;
            font-weight: bold;
            z-index: 100;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #reset-btn:active { background: #f1c40f; color: #2c3e50; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <button id="reset-btn">RESET HELI</button>

    <div id="ui-container">
        <div id="left-joystick" class="joystick-zone"></div>
        <div id="right-joystick" class="joystick-zone"></div>
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; maxDetectionRate: 30;" 
             renderer="precision: medium; antialias: false;">
        
        <a-marker preset="hiro" id="main-marker" smooth="true" smoothCount="5">
            <a-entity id="heli-rig" position="0 0.5 0">
                <a-box width="0.3" height="0.3" depth="0.6" color="#2c3e50">
                    <a-box position="0 0.05 0.31" width="0.28" height="0.25" depth="0.1" color="#f1c40f"></a-box>
                    <a-box position="0 0.05 -0.45" width="0.08" height="0.08" depth="0.4" color="#2c3e50"></a-box>
                    <a-box position="0 0.15 -0.6" width="0.02" height="0.25" depth="0.1" color="#e74c3c"></a-box>
                </a-box>
                <a-box position="-0.15 -0.2 0" width="0.03" height="0.03" depth="0.6" color="#7f8c8d"></a-box>
                <a-box position="0.15 -0.2 0" width="0.03" height="0.03" depth="0.6" color="#7f8c8d"></a-box>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const heli = document.querySelector('#heli-rig');
        const resetBtn = document.getElementById('reset-btn');
        
        let cyclic = { x: 0, y: 0 }; 
        let pedals = { yaw: 0, alt: 0 }; 
        
        // Initial Flight State
        let heliOffset = { x: 0, y: 0.5, z: 0 };
        let heliRotation = 0; 
        const speed = 0.04;

        // RESET LOGIC
        resetBtn.addEventListener('click', () => {
            heliOffset = { x: 0, y: 0.5, z: 0 };
            heliRotation = 0;
            // Immediate visual snap
            heli.setAttribute('position', '0 0.5 0');
            heli.setAttribute('rotation', '0 0 0');
        });

        // Joystick Setup (Left: Move/Strafe)
        nipplejs.create({
            zone: document.getElementById('left-joystick'),
            mode: 'static', position: { left: '80px', bottom: '80px' }, color: 'cyan'
        }).on('move', (evt, data) => {
            cyclic.x = data.vector.x; 
            cyclic.y = data.vector.y; 
        }).on('end', () => { cyclic = { x: 0, y: 0 }; });

        // Joystick Setup (Right: Turn/Height)
        nipplejs.create({
            zone: document.getElementById('right-joystick'),
            mode: 'static', position: { right: '80px', bottom: '80px' }, color: 'orange'
        }).on('move', (evt, data) => {
            pedals.yaw = -data.vector.x * 2.5; 
            pedals.alt = data.vector.y * 0.03;
        }).on('end', () => { pedals.yaw = 0; pedals.alt = 0; });

        function update() {
            if (heli) {
                // Update internal rotation state
                heliRotation += pedals.yaw;
                let angleRad = (heliRotation * Math.PI) / 180;
                
                // Calculate Forward/Backward vectors
                let fwdX = Math.sin(angleRad) * (cyclic.y * speed);
                let fwdZ = Math.cos(angleRad) * (cyclic.y * speed);

                // Calculate Strafe vectors (corrected)
                let strafeAngle = angleRad + (Math.PI / 2);
                let strX = Math.sin(strafeAngle) * (-cyclic.x * speed);
                let strZ = Math.cos(strafeAngle) * (-cyclic.x * speed);

                // Apply deltas to our persistent offset
                heliOffset.x += (fwdX + strX);
                heliOffset.z += (fwdZ + strZ);
                heliOffset.y = Math.max(0.1, heliOffset.y + pedals.alt);

                // Final Transform
                heli.setAttribute('position', heliOffset);
                heli.setAttribute('rotation', { x: 0, y: heliRotation, z: 0 });
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
