<!DOCTYPE html>
<html>
<head>
    <title>AR Heli: Optimized Flight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 220px;
            z-index: 10; display: flex; justify-content: space-between; pointer-events: none;
        }
        .joystick-zone { width: 160px; height: 160px; pointer-events: auto; margin: 30px; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <div id="ui-container">
        <div id="left-joystick" class="joystick-zone"></div>
        <div id="right-joystick" class="joystick-zone"></div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: false; precision: medium;">
        <a-marker preset="hiro">
            
            <a-entity id="heli-rig" position="0 0.5 0">
                
                <a-box position="0 0 0" width="0.3" height="0.3" depth="0.6" color="#2c3e50">
                    
                    <a-box position="0 0.05 0.31" width="0.28" height="0.25" depth="0.1" color="#f1c40f"></a-box>
                    
                    <a-box position="0 0.05 -0.45" width="0.08" height="0.08" depth="0.4" color="#2c3e50"></a-box>
                    
                    <a-box position="0 0.15 -0.6" width="0.02" height="0.25" depth="0.1" color="#e74c3c"></a-box>

                </a-box>

                <a-box position="-0.15 -0.2 0" width="0.03" height="0.03" depth="0.6" color="#7f8c8d"></a-box>
                <a-box position="0.15 -0.2 0" width="0.03" height="0.03" depth="0.6" color="#7f8c8d"></a-box>
            </a-entity>

        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const heli = document.querySelector('#heli-rig');
        let cyclic = { x: 0, y: 0 }; 
        let pedals = { yaw: 0, alt: 0 }; 
        const speed = 0.04;

        nipplejs.create({
            zone: document.getElementById('left-joystick'),
            mode: 'static', position: { left: '80px', bottom: '80px' }, color: 'cyan'
        }).on('move', (evt, data) => {
            cyclic.x = data.vector.x; 
            cyclic.y = data.vector.y; 
        }).on('end', () => { cyclic = { x: 0, y: 0 }; });

        nipplejs.create({
            zone: document.getElementById('right-joystick'),
            mode: 'static', position: { right: '80px', bottom: '80px' }, color: 'orange'
        }).on('move', (evt, data) => {
            pedals.yaw = -data.vector.x * 2.5; 
            pedals.alt = data.vector.y * 0.03;
        }).on('end', () => { pedals.yaw = 0; pedals.alt = 0; });

        function update() {
            if (heli) {
                let rot = heli.getAttribute('rotation');
                let pos = heli.getAttribute('position');

                let newYaw = rot.y + pedals.yaw;
                heli.setAttribute('rotation', { x: 0, y: newYaw, z: 0 });

                let angleRad = (newYaw * Math.PI) / 180;
                
                // Forward/Backward
                let fwdX = Math.sin(angleRad) * (cyclic.y * speed);
                let fwdZ = Math.cos(angleRad) * (cyclic.y * speed);

                // Strafe (Correction: Use negative cyclic.x to flip the direction)
                let strafeAngle = angleRad + (Math.PI / 2);
                let strX = Math.sin(strafeAngle) * (-cyclic.x * speed);
                let strZ = Math.cos(strafeAngle) * (-cyclic.x * speed);

                heli.setAttribute('position', {
                    x: pos.x + fwdX + strX,
                    y: Math.max(0.1, pos.y + pedals.alt),
                    z: pos.z + fwdZ + strZ
                });
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
